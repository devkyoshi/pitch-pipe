version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: veo_user
      POSTGRES_PASSWORD: veo_pass
      POSTGRES_DB: veo_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veo_user -d veo_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://veo_user:veo_pass@postgres:5432/veo_pipeline
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - ./service_account.json:/app/service_account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.tasks.pipeline_task.app_celery worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://veo_user:veo_pass@postgres:5432/veo_pipeline
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - ./service_account.json:/app/service_account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
